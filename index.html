<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="mainBody">
        <input class="dispInp" type="text" placeholder="0"/>
        <div class="mainGrid">
            <div class="calcButton">Clear</div>
            <div class="calcButton">BackSpace</div>
            <div class="calcButton">.</div>
            <div class="calcButton" data-value="op">X</div>
            <div class="calcButton" data-value="7">7</div>
            <div class="calcButton" data-value="8">8</div>
            <div class="calcButton" data-value="9">9</div>
            <div class="calcButton" data-value="op">/</div>
            <div class="calcButton" data-value="4">4</div>
            <div class="calcButton" data-value="5">5</div>
            <div class="calcButton" data-value="6">6</div>
            <div class="calcButton" data-value="op">-</div>
            <div class="calcButton" data-value="1">1</div>
            <div class="calcButton" data-value="2">2</div>
            <div class="calcButton" data-value="3">3</div>
            <div class="calcButton" data-value="op">+</div>
            <div class="calcButton" data-value="0">0</div>
            <div class="calcButton" data-value="0">00</div>
            <div class="calcButton" data-value="op" id="one">=</div>
        </div>
    </div>
    <script src="calc.js"></script>
</body>
</html>
